name: Build & Deploy → Netlify

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    name: Build e deploy no Netlify

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Instalar dependências raiz (para Netlify Functions)
        run: npm install

      - name: Instalar dependências do frontend e build
        working-directory: frontend
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          VITE_API_URL: ${{ secrets.VITE_API_URL }}
        run: npm install && npm run build

      - name: Instalar Netlify CLI
        run: npm install -g netlify-cli

      - name: Deploy preview (PRs)
        if: github.event_name == 'pull_request'
        run: netlify deploy --dir=frontend/dist --functions=netlify/functions --site=${{ secrets.NETLIFY_SITE_ID }}
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}

      - name: Deploy produção (push na main)
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: netlify deploy --prod --dir=frontend/dist --functions=netlify/functions --site=${{ secrets.NETLIFY_SITE_ID }}
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
